[build]
  publish = "client/dist"
  command = "npm install && cd client && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/create-order"
  to = "/.netlify/functions/create-order"
  status = 200

[[redirects]]
  from = "/api/orders"
  to = "/.netlify/functions/get-orders"
  status = 200

# MUST be before /api/orders/:id to avoid :id catching "5/print"
[[redirects]]
  from = "/api/orders/:id/print"
  to = "/.netlify/functions/print-order?id=:id"
  status = 200

# Handles both GET and PUT
[[redirects]]
  from = "/api/orders/:id"
  to = "/.netlify/functions/order-by-id?id=:id"
  status = 200

[[redirects]]
  from = "/api/customers"
  to = "/.netlify/functions/get-customers"
  status = 200

# MUST be before /api/customers/:id to avoid :id catching "5/orders"
[[redirects]]
  from = "/api/customers/:id/orders"
  to = "/.netlify/functions/customer-orders?id=:id"
  status = 200

[[redirects]]
  from = "/api/customers/:id"
  to = "/.netlify/functions/customer-by-id?id=:id"
  status = 200

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
